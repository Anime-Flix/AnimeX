<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      !(function () {
        var h = location.hostname;
        var b = h === "localhost" || h === "127.0.0.1" ? "/" : "/AnimeX/";
        document.write('<base href="' + b + '">');
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reproduciendo — AnimeX</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <style>
      * {
        user-select: none;
      }
      input,
      textarea {
        user-select: text;
      }
      body {
        background: #000;
        overflow: hidden;
      }

      .player-page {
        height: 100vh;
        background: #000;
        position: relative;
      }

      .video-wrap {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      .player-iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* Barra superior */
      .player-topbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.85) 0%,
          transparent 100%
        );
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .player-topbar.visible,
      .player-topbar.drive-mode {
        opacity: 1;
        pointer-events: all;
      }

      .player-back {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        text-decoration: none;
        opacity: 0.9;
        transition: opacity 0.15s;
      }
      .player-back:hover {
        opacity: 1;
      }

      .player-title-wrap {
        text-align: center;
        flex: 1;
        padding: 0 12px;
      }
      .player-anime-title {
        font-weight: 700;
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.95);
      }
      .player-ep-title {
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 2px;
      }

      .ctrl-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.85);
        transition:
          color 0.15s,
          transform 0.15s;
        padding: 6px;
        border-radius: 6px;
        background: none;
        border: none;
        cursor: pointer;
      }
      .ctrl-btn:hover {
        color: #fff;
        transform: scale(1.1);
      }
      .ctrl-btn svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Panel de episodios */
      .episode-panel {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 300px;
        background: rgba(7, 7, 16, 0.98);
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        z-index: 40;
        display: flex;
        flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.4s ease;
      }
      .episode-panel.open {
        transform: translateX(0);
      }

      .ep-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .ep-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .ep-item {
        display: flex;
        gap: 12px;
        padding: 10px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s;
        border: 1px solid transparent;
      }
      .ep-item:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .ep-item.active {
        background: rgba(124, 58, 237, 0.12);
        border-color: rgba(124, 58, 237, 0.3);
      }

      .ep-thumb-box {
        width: 80px;
        height: 50px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.4);
        flex-shrink: 0;
        overflow: hidden;
      }
      .ep-thumb-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .ep-info {
        flex: 1;
        min-width: 0;
      }
      .ep-num {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 600;
        margin-bottom: 2px;
      }
      .ep-title {
        font-size: 0.875rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #fff;
      }
      .ep-dur {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 2px;
      }

      /* Loading */
      .player-loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 5;
        flex-direction: column;
        gap: 16px;
      }
      .player-spinner {
        width: 52px;
        height: 52px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Autoplay banner */
      .autoplay-banner {
        position: fixed;
        bottom: 80px;
        right: 32px;
        background: rgba(14, 14, 26, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        padding: 20px;
        display: none;
        align-items: center;
        gap: 20px;
        z-index: 50;
        min-width: 300px;
      }
      .autoplay-banner.show {
        display: flex;
      }

      .skip-btn {
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 0.8125rem;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        transition: background 0.15s;
      }
      .skip-btn:hover {
        background: #7c3aed;
        border-color: #7c3aed;
      }

      /* Toasts */
      #toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .toast {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(14, 14, 26, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        color: #fff;
        font-size: 0.875rem;
        min-width: 240px;
        transform: translateX(120%);
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s;
        opacity: 0;
      }
      .toast.show {
        transform: translateX(0);
        opacity: 1;
      }
      .toast-info {
        border-left: 3px solid #3b82f6;
      }
      .toast-success {
        border-left: 3px solid #10b981;
      }
      .toast-error {
        border-left: 3px solid #ef4444;
      }
      .toast-warning {
        border-left: 3px solid #f59e0b;
      }

      @media (max-width: 768px) {
        .episode-panel {
          width: 100%;
        }
        .player-topbar {
          padding: 12px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="player-page">
      <div class="video-wrap" id="video-wrap">
        <div class="player-loading" id="player-loading">
          <div class="player-spinner"></div>
          <p style="color: rgba(255, 255, 255, 0.5); font-size: 0.875rem">
            Cargando episodio...
          </p>
        </div>

        <iframe
          class="player-iframe"
          id="player-iframe"
          src="about:blank"
          allow="autoplay; fullscreen; picture-in-picture"
        ></iframe>

        <!-- Barra superior -->
        <div class="player-topbar" id="player-topbar">
          <a href="javascript:history.back()" class="player-back">
            <svg
              viewBox="0 0 24 24"
              width="22"
              height="22"
              stroke="#fff"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
            Volver
          </a>

          <div class="player-title-wrap">
            <div class="player-anime-title" id="player-anime-name">
              Cargando...
            </div>
            <div class="player-ep-title" id="player-ep-name"></div>
          </div>

          <div style="display: flex; align-items: center; gap: 4px">
            <button class="ctrl-btn" id="prev-ep-btn" title="Episodio anterior">
              <svg viewBox="0 0 24 24">
                <polygon points="19 20 9 12 19 4 19 20" />
                <line x1="5" y1="19" x2="5" y2="5" />
              </svg>
            </button>
            <button
              class="ctrl-btn"
              id="next-ep-btn"
              title="Siguiente episodio"
            >
              <svg viewBox="0 0 24 24">
                <polygon points="5 4 15 12 5 20 5 4" />
                <line x1="19" y1="5" x2="19" y2="19" />
              </svg>
            </button>
            <button
              class="ctrl-btn"
              id="ep-list-btn"
              title="Lista de episodios"
            >
              <svg viewBox="0 0 24 24">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
              </svg>
            </button>
            <button class="ctrl-btn" id="fs-btn" title="Pantalla completa (F)">
              <svg viewBox="0 0 24 24" id="fs-icon">
                <path
                  d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- Panel de episodios -->
        <div class="episode-panel" id="episode-panel">
          <div class="ep-panel-header">
            <span style="font-weight: 700; font-size: 1rem; color: #fff"
              >Episodios</span
            >
            <button class="ctrl-btn" id="close-ep-btn">
              <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
          <div class="ep-list" id="ep-list"></div>
        </div>
      </div>
    </div>

    <!-- Autoplay banner -->
    <div class="autoplay-banner" id="autoplay-banner">
      <div>
        <p
          style="
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
          "
        >
          Siguiente en
        </p>
        <p style="font-weight: 700; color: #fff" id="autoplay-title">-</p>
      </div>
      <div style="text-align: center">
        <div
          style="font-size: 1.5rem; font-weight: 800; color: #a855f7"
          id="autoplay-count"
        >
          10
        </div>
        <button class="skip-btn" id="autoplay-now" style="margin-top: 4px">
          Ver ahora
        </button>
        <button
          class="ctrl-btn"
          id="autoplay-cancel"
          style="
            margin-top: 4px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
          "
        >
          Cancelar
        </button>
      </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
      import {
        onAuthChange,
        getCurrentUserData,
      } from "./assets/js/core/auth.js";
      import {
        getAnime,
        getSeasons,
        getEpisodes,
        registerView,
      } from "./assets/js/services/animeService.js";
      import {
        saveProgress,
        getProgress,
      } from "./assets/js/services/userService.js";

      const params = new URLSearchParams(location.search);
      const animeId = params.get("anime");
      const seasonId = params.get("season");
      const episodeId = params.get("episode");

      var fakeTime = 0;
      var fakeTimer = null;
      var currentSpeed = 1;
      var allEpisodes = [];
      var currentIdx = 0;
      var anime = null;
      var episode = null;
      var autoplayTimer = null;
      var cursorTimer = null;
      var isDriveMode = false;

      function toast(msg, type) {
        if (!type) type = "info";
        var c = document.getElementById("toast-container");
        var t = document.createElement("div");
        t.className = "toast toast-" + type;
        t.textContent = msg;
        c.appendChild(t);
        requestAnimationFrame(function () {
          t.classList.add("show");
        });
        setTimeout(function () {
          t.classList.remove("show");
          setTimeout(function () {
            t.remove();
          }, 400);
        }, 3000);
      }

      function fmt(s) {
        s = Math.floor(s);
        var h = Math.floor(s / 3600);
        var m = Math.floor((s % 3600) / 60);
        var sec = s % 60;
        if (h > 0) return h + ":" + pad(m) + ":" + pad(sec);
        return m + ":" + pad(sec);
      }
      function pad(n) {
        return n < 10 ? "0" + n : "" + n;
      }

      onAuthChange(async function (user) {
        if (!user) {
          location.href = "login.html";
          return;
        }
        var data = await getCurrentUserData();
        if (!data || data.status !== "active") {
          location.href = "activate.html";
          return;
        }
        if (!animeId || !seasonId || !episodeId) {
          document.getElementById("player-loading").innerHTML =
            '<p style="color:#fff;">Parámetros inválidos</p><a href="index.html" style="color:#a855f7;">Volver al inicio</a>';
          return;
        }
        loadPlayer();
      });

      async function loadPlayer() {
        try {
          var animeData = await getAnime(animeId);
          if (!animeData) throw new Error("Anime no encontrado");
          anime = animeData;

          var seasons = await getSeasons(animeId);
          var season = null;
          for (var i = 0; i < seasons.length; i++) {
            if (seasons[i].id === seasonId) {
              season = seasons[i];
              break;
            }
          }
          if (!season && seasons.length > 0) season = seasons[0];

          var episodes = season ? await getEpisodes(animeId, season.id) : [];
          allEpisodes = episodes;
          currentIdx = 0;
          for (var j = 0; j < episodes.length; j++) {
            if (episodes[j].id === episodeId) {
              currentIdx = j;
              break;
            }
          }
          episode = episodes[currentIdx] || null;

          document.title = anime.title + " — AnimeX";
          document.getElementById("player-anime-name").textContent =
            anime.title;

          var tNum = season ? season.number || 1 : 1;
          var eNum = episode ? episode.number || 1 : 1;
          var eTit = episode ? episode.title || "" : "";
          document.getElementById("player-ep-name").textContent =
            "T" + tNum + " E" + eNum + (eTit ? ": " + eTit : "");

          renderEpList(episodes, currentIdx);

          if (episode) {
            loadVideo(episode);
            registerView(animeId);
          }

          document.getElementById("player-loading").style.display = "none";
        } catch (err) {
          console.error(err);
          document.getElementById("player-loading").innerHTML =
            '<p style="color:#fff;margin-bottom:16px;">Error: ' +
            err.message +
            "</p>" +
            '<a href="javascript:history.back()" style="background:#7c3aed;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;">Volver</a>';
        }
      }

      function loadVideo(ep) {
        var iframe = document.getElementById("player-iframe");
        var topbar = document.getElementById("player-topbar");

        if (ep.driveFileId) {
          isDriveMode = true;
          iframe.src =
            "https://drive.google.com/file/d/" + ep.driveFileId + "/preview";
          topbar.classList.add("drive-mode");
          startFakeTimer();
          return;
        }

        if (ep.videoUrl) {
          isDriveMode = false;
          iframe.src = ep.videoUrl;
          iframe.addEventListener(
            "load",
            function () {
              if (!iframe.src || iframe.src === "about:blank") return;
              getProgress(animeId, seasonId, ep.id)
                .then(function (saved) {
                  if (saved && saved.currentTime > 5) {
                    fakeTime = saved.currentTime;
                    toast(
                      "Continuando desde " + fmt(saved.currentTime),
                      "info",
                    );
                  }
                  startFakeTimer();
                })
                .catch(function () {
                  startFakeTimer();
                });
            },
            { once: true },
          );
          return;
        }

        // Sin video
        isDriveMode = true;
        topbar.classList.add("drive-mode");
        startFakeTimer();
      }

      function startFakeTimer() {
        if (fakeTimer) clearInterval(fakeTimer);
        fakeTimer = setInterval(function () {
          fakeTime += currentSpeed;
          var dur = episode && episode.duration ? episode.duration : 1440;
          if (fakeTime % 10 < currentSpeed) {
            saveProgress(animeId, seasonId, episodeId, fakeTime, dur).catch(
              function () {},
            );
          }
          if (
            fakeTime >= dur - 30 &&
            fakeTime < dur - 25 &&
            allEpisodes[currentIdx + 1]
          ) {
            showAutoplay();
          }
        }, 1000);
      }

      function renderEpList(episodes, activeIdx) {
        var list = document.getElementById("ep-list");
        list.innerHTML = "";
        episodes.forEach(function (ep, i) {
          var item = document.createElement("div");
          item.className = "ep-item" + (i === activeIdx ? " active" : "");
          item.dataset.idx = i;

          var thumbBox = document.createElement("div");
          thumbBox.className = "ep-thumb-box";
          if (ep.thumbnail) {
            var img = document.createElement("img");
            img.src = ep.thumbnail;
            img.style.cssText = "width:100%;height:100%;object-fit:cover;";
            img.onerror = function () {
              this.remove();
            };
            thumbBox.appendChild(img);
          } else {
            thumbBox.textContent = "EP " + (ep.number || i + 1);
          }

          var info = document.createElement("div");
          info.className = "ep-info";
          var num = document.createElement("div");
          num.className = "ep-num";
          num.textContent = "Episodio " + (ep.number || i + 1);
          var title = document.createElement("div");
          title.className = "ep-title";
          title.textContent = ep.title
            ? ep.title
            : "Episodio " + (ep.number || i + 1);
          var dur = document.createElement("div");
          dur.className = "ep-dur";
          dur.textContent = ep.duration ? fmt(ep.duration) : "";

          info.appendChild(num);
          info.appendChild(title);
          info.appendChild(dur);
          item.appendChild(thumbBox);
          item.appendChild(info);
          item.addEventListener("click", function () {
            goToEp(parseInt(item.dataset.idx));
          });
          list.appendChild(item);
        });
      }

      function goToEp(idx) {
        if (idx < 0 || idx >= allEpisodes.length) return;
        var ep = allEpisodes[idx];
        var url = new URL(location.href);
        url.searchParams.set("episode", ep.id);
        location.href = url.toString();
      }

      function showAutoplay() {
        if (!allEpisodes[currentIdx + 1]) return;
        var next = allEpisodes[currentIdx + 1];
        var banner = document.getElementById("autoplay-banner");
        document.getElementById("autoplay-title").textContent =
          "Episodio " +
          (next.number || "") +
          (next.title ? ": " + next.title : "");
        banner.classList.add("show");
        var count = 10;
        document.getElementById("autoplay-count").textContent = count;
        autoplayTimer = setInterval(function () {
          count--;
          document.getElementById("autoplay-count").textContent = count;
          if (count <= 0) {
            clearInterval(autoplayTimer);
            goToEp(currentIdx + 1);
          }
        }, 1000);
      }

      // Topbar hover (solo en modo no-Drive)
      var topbar = document.getElementById("player-topbar");
      var wrap = document.getElementById("video-wrap");
      function showTopbar() {
        if (isDriveMode) return;
        topbar.classList.add("visible");
        clearTimeout(cursorTimer);
        cursorTimer = setTimeout(function () {
          topbar.classList.remove("visible");
        }, 3000);
      }
      wrap.addEventListener("mousemove", showTopbar);
      wrap.addEventListener("touchstart", showTopbar, { passive: true });

      // Panel episodios
      document
        .getElementById("ep-list-btn")
        .addEventListener("click", function () {
          document.getElementById("episode-panel").classList.toggle("open");
        });
      document
        .getElementById("close-ep-btn")
        .addEventListener("click", function () {
          document.getElementById("episode-panel").classList.remove("open");
        });

      // Nav
      document
        .getElementById("prev-ep-btn")
        .addEventListener("click", function () {
          goToEp(currentIdx - 1);
        });
      document
        .getElementById("next-ep-btn")
        .addEventListener("click", function () {
          goToEp(currentIdx + 1);
        });

      // Pantalla completa
      document.getElementById("fs-btn").addEventListener("click", function () {
        if (!document.fullscreenElement) {
          wrap.requestFullscreen().catch(function () {});
        } else {
          document.exitFullscreen();
        }
      });
      document.addEventListener("fullscreenchange", function () {
        var icon = document.getElementById("fs-icon");
        icon.innerHTML = "";
        var path = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path",
        );
        if (document.fullscreenElement) {
          path.setAttribute(
            "d",
            "M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3",
          );
        } else {
          path.setAttribute(
            "d",
            "M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3",
          );
        }
        icon.appendChild(path);
      });

      // Autoplay
      document
        .getElementById("autoplay-now")
        .addEventListener("click", function () {
          clearInterval(autoplayTimer);
          goToEp(currentIdx + 1);
        });
      document
        .getElementById("autoplay-cancel")
        .addEventListener("click", function () {
          clearInterval(autoplayTimer);
          document.getElementById("autoplay-banner").classList.remove("show");
        });

      // Teclado
      document.addEventListener("keydown", function (e) {
        var tag = document.activeElement.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        switch (e.key) {
          case "n":
          case "N":
            goToEp(currentIdx + 1);
            break;
          case "p":
          case "P":
            goToEp(currentIdx - 1);
            break;
          case "f":
          case "F":
            document.getElementById("fs-btn").click();
            break;
        }
      });
    </script>
  </body>
</html>
