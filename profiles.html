<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <script>!function(){var h=location.hostname;var b=(h==="localhost"||h==="127.0.0.1")?"/":"/AnimeX/";document.write("<base href=\""+b+"\">")}()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfiles — AnimeX</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--sp-8); }

    .profiles-page { width: 100%; max-width: 700px; }

    .profiles-title {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 700;
      text-align: center;
      margin-bottom: var(--sp-3);
    }

    .profiles-sub {
      text-align: center;
      color: var(--c-text-2);
      margin-bottom: var(--sp-10);
    }

    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: var(--sp-6);
      margin-bottom: var(--sp-8);
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-3);
      cursor: pointer;
      transition: transform var(--t-spring);
    }

    .profile-card:hover { transform: scale(1.05); }

    .profile-card-avatar {
      width: 100px; height: 100px;
      border-radius: var(--r-xl);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 2.5rem; font-weight: 900;
      color: #fff;
      border: 3px solid transparent;
      transition: border-color var(--t-base);
      position: relative;
    }

    .profile-card:hover .profile-card-avatar { border-color: #fff; box-shadow: var(--shadow-glow); }

    .profile-card-name { font-weight: 600; font-size: .9375rem; }

    .profile-card-plan { font-size: .75rem; color: var(--c-text-3); }

    .profile-card-edit {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: var(--r-xl);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity var(--t-base);
      font-size: .8rem; font-weight: 700; color: #fff;
    }

    .profile-card:hover .profile-card-edit { opacity: 1; }

    /* Add profile card */
    .profile-card-add .profile-card-avatar {
      background: var(--c-surface2) !important;
      border: 2px dashed var(--c-border2) !important;
      color: var(--c-text-3);
      font-size: 2rem;
    }

    .profile-card-add:hover .profile-card-avatar {
      border-color: var(--c-accent) !important;
      color: var(--c-accent2);
    }

    /* Edit modal */
    .avatar-colors {
      display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-top: var(--sp-3);
    }

    .color-swatch {
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform var(--t-fast), border-color var(--t-fast);
    }

    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px var(--c-accent); }

    /* Large avatar preview */
    .avatar-preview-lg {
      width: 80px; height: 80px;
      border-radius: var(--r-xl);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 900;
      color: #fff;
      margin: 0 auto var(--sp-4);
    }
  </style>
</head>
<body>
<div class="auth-bg"></div>

<div class="profiles-page anim-scale-in">

  <a href="index.html" class="auth-logo" style="justify-content:center;margin-bottom:var(--sp-8);">
    <div class="auth-logo-mark">X</div>
    <span class="auth-logo-name">AnimeX</span>
  </a>

  <h1 class="profiles-title">¿Quién está viendo?</h1>
  <p class="profiles-sub">Selecciona o edita tu perfil</p>

  <div class="profiles-grid" id="profiles-grid">
    <!-- Rendered by JS -->
    <div class="skeleton" style="height:140px;border-radius:var(--r-xl);"></div>
    <div class="skeleton" style="height:140px;border-radius:var(--r-xl);"></div>
  </div>

  <div style="text-align:center;">
    <a href="index.html" class="btn btn-ghost text-sm">← Volver al inicio</a>
    <span style="margin:0 var(--sp-4);color:var(--c-border2);">·</span>
    <button class="btn btn-ghost text-sm" id="logout-btn">Cerrar sesión</button>
  </div>
</div>

<!-- Edit/Create profile modal -->
<div class="overlay" id="profile-modal">
  <div class="card-glass anim-scale-in" style="width:100%;max-width:400px;padding:var(--sp-8);">
    <h3 style="font-family:var(--font-display);font-weight:700;font-size:1.125rem;margin-bottom:var(--sp-6);text-align:center;" id="modal-title">Nuevo perfil</h3>

    <div id="avatar-preview-lg" class="avatar-preview-lg" style="background:var(--c-accent);">U</div>

    <div style="display:flex;flex-direction:column;gap:var(--sp-4);">
      <div class="input-group">
        <label class="input-label">Nombre del perfil</label>
        <input type="text" class="input-field" id="profile-name-input" placeholder="Mi nombre" maxlength="20" />
      </div>

      <div class="input-group">
        <label class="input-label">Color</label>
        <div class="avatar-colors" id="color-picker"></div>
      </div>

      <div class="input-group">
        <label class="input-label">Idioma preferido</label>
        <select class="input-field" id="profile-lang">
          <option value="es">Español</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="pt">Português</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:var(--sp-3);margin-top:var(--sp-6);">
      <button class="btn btn-ghost btn-full" id="delete-profile-btn" style="display:none;color:var(--c-error);">Eliminar</button>
      <button class="btn btn-ghost btn-full" onclick="document.getElementById('profile-modal').classList.remove('open')">Cancelar</button>
      <button class="btn btn-primary btn-full" id="save-profile-btn"><span class="btn-text">Guardar</span></button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { auth, db } from './assets/js/core/firebase.js';
import { onAuthChange, getCurrentUserData, logoutUser } from './assets/js/core/auth.js';
import { getProfiles } from './assets/js/services/userService.js';
import { getPlan } from './assets/js/services/planService.js';
import { showToast } from './assets/js/components/toast.js';
import {
  collection, doc, setDoc, deleteDoc, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const COLORS = [
  '#7c3aed','#a855f7','#ec4899','#ef4444','#f59e0b',
  '#10b981','#3b82f6','#06b6d4','#84cc16','#f97316',
];

let profiles     = [];
let plan         = null;
let editingId    = null;
let selectedColor = '#7c3aed';
let uid          = null;

// Auth guard
onAuthChange(async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  const data = await getCurrentUserData();
  if (!data || data.status !== 'active') { window.location.href = 'activate.html'; return; }

  uid = user.uid;
  plan = await getPlan(data.planId);
  profiles = await getProfiles();
  renderProfiles();
  initColorPicker();
});

function renderProfiles() {
  const grid = document.getElementById('profiles-grid');
  grid.innerHTML = '';

  profiles.forEach(p => {
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `
      <div class="profile-card-avatar" style="background:${p.color || '#7c3aed'}">
        ${(p.name || 'U')[0].toUpperCase()}
        <div class="profile-card-edit">✏️ Editar</div>
      </div>
      <span class="profile-card-name">${p.name}</span>
      ${p.isDefault ? '<span class="profile-card-plan badge badge-accent" style="font-size:.65rem;">Principal</span>' : ''}
    `;

    // Click: select profile and go home
    card.addEventListener('click', (e) => {
      // Detect if clicking edit area
      localStorage.setItem('animex_profile', p.id);
      window.location.href = 'index.html';
    });

    // Long press or right click to edit
    let pressTimer;
    card.addEventListener('mousedown', () => {
      pressTimer = setTimeout(() => openEdit(p), 600);
    });
    card.addEventListener('mouseup', () => clearTimeout(pressTimer));
    card.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      openEdit(p);
    });

    grid.appendChild(card);
  });

  // Add profile button (if under plan limit)
  const maxProfiles = plan?.profiles || 1;
  if (profiles.length < maxProfiles) {
    const addCard = document.createElement('div');
    addCard.className = 'profile-card profile-card-add';
    addCard.innerHTML = `
      <div class="profile-card-avatar">＋</div>
      <span class="profile-card-name">Agregar perfil</span>
    `;
    addCard.addEventListener('click', () => openCreate());
    grid.appendChild(addCard);
  }

  // Show limit info
  if (profiles.length >= (plan?.profiles || 1)) {
    const note = document.createElement('p');
    note.className = 'text-xs text-faint';
    note.style.textAlign = 'center';
    note.style.gridColumn = '1/-1';
    note.textContent = `Tu plan ${plan?.name || ''} permite ${plan?.profiles || 1} perfil(es). Haz clic derecho en un perfil para editarlo.`;
    grid.appendChild(note);
  }
}

function initColorPicker() {
  const container = document.getElementById('color-picker');
  container.innerHTML = '';
  COLORS.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = color;
    sw.dataset.color = color;
    sw.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      selectedColor = color;
      updatePreview();
    });
    if (color === selectedColor) sw.classList.add('active');
    container.appendChild(sw);
  });
}

function updatePreview() {
  const name = document.getElementById('profile-name-input').value || 'U';
  const prev = document.getElementById('avatar-preview-lg');
  prev.textContent = name[0].toUpperCase();
  prev.style.background = selectedColor;
}

document.getElementById('profile-name-input').addEventListener('input', updatePreview);

function openCreate() {
  editingId = null;
  selectedColor = COLORS[profiles.length % COLORS.length];
  document.getElementById('modal-title').textContent = 'Nuevo perfil';
  document.getElementById('profile-name-input').value = '';
  document.getElementById('profile-lang').value = 'es';
  document.getElementById('delete-profile-btn').style.display = 'none';
  initColorPicker();
  updatePreview();
  document.getElementById('profile-modal').classList.add('open');
}

function openEdit(profile) {
  editingId = profile.id;
  selectedColor = profile.color || '#7c3aed';
  document.getElementById('modal-title').textContent = `Editar ${profile.name}`;
  document.getElementById('profile-name-input').value = profile.name;
  document.getElementById('profile-lang').value = profile.language || 'es';
  document.getElementById('delete-profile-btn').style.display = profile.isDefault ? 'none' : '';
  initColorPicker();
  updatePreview();
  document.getElementById('profile-modal').classList.add('open');
}

// Save
document.getElementById('save-profile-btn').addEventListener('click', async () => {
  const btn  = document.getElementById('save-profile-btn');
  const name = document.getElementById('profile-name-input').value.trim();
  const lang = document.getElementById('profile-lang').value;

  if (!name) { showToast('Ingresa un nombre', 'warning'); return; }

  btn.classList.add('loading'); btn.disabled = true;

  try {
    const id  = editingId || `profile_${Date.now()}`;
    const data = {
      name, color: selectedColor, language: lang,
      updatedAt: serverTimestamp(),
    };
    if (!editingId) {
      data.isDefault = profiles.length === 0;
      data.createdAt = serverTimestamp();
    }

    await setDoc(doc(db, 'users', uid, 'profiles', id), data, { merge: true });

    showToast(editingId ? 'Perfil actualizado' : 'Perfil creado', 'success');
    document.getElementById('profile-modal').classList.remove('open');
    profiles = await getProfiles();
    renderProfiles();
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
});

// Delete
document.getElementById('delete-profile-btn').addEventListener('click', async () => {
  if (!editingId || !confirm('¿Eliminar este perfil? Se perderá su historial.')) return;
  await deleteDoc(doc(db, 'users', uid, 'profiles', editingId));
  showToast('Perfil eliminado', 'success');
  document.getElementById('profile-modal').classList.remove('open');
  if (localStorage.getItem('animex_profile') === editingId) localStorage.removeItem('animex_profile');
  profiles = await getProfiles();
  renderProfiles();
});

// Logout
document.getElementById('logout-btn').addEventListener('click', async () => {
  await logoutUser();
  window.location.href = 'login.html';
});

document.getElementById('profile-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('profile-modal'))
    document.getElementById('profile-modal').classList.remove('open');
});
</script>
</body>
</html>
