<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <script>!function(){var h=location.hostname;var b=(h==="localhost"||h==="127.0.0.1")?"/":"/AnimeX/";document.write("<base href=\""+b+"\">")}()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime — AnimeX</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/home.css" />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <style>
    /* ── Anime detail page ── */
    .anime-hero {
      position: relative;
      min-height: 60vh;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .anime-hero-bg {
      position: absolute;
      inset: 0;
    }

    .anime-hero-bg-img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: blur(2px) brightness(0.4);
      transform: scale(1.05);
    }

    .anime-hero-gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, var(--c-bg) 0%, rgba(7,7,16,0.5) 60%, transparent 100%),
        linear-gradient(to right, var(--c-bg) 0%, transparent 50%);
    }

    .anime-hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      gap: var(--sp-8);
      padding: 80px var(--sp-8) var(--sp-8);
      align-items: flex-end;
    }

    .anime-cover-img {
      width: 180px;
      flex-shrink: 0;
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg), 0 0 40px rgba(0,0,0,0.5);
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    .anime-hero-info { flex: 1; min-width: 0; }

    .anime-detail-genres {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }

    .anime-detail-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: var(--sp-4);
    }

    .anime-detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-4);
      margin-bottom: var(--sp-5);
    }

    .anime-meta-item {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: .875rem;
      color: var(--c-text-2);
    }

    .anime-detail-actions {
      display: flex;
      gap: var(--sp-3);
      flex-wrap: wrap;
    }

    /* Body */
    .anime-body {
      padding: var(--sp-8);
      max-width: 1200px;
      margin: 0 auto;
    }

    .anime-synopsis {
      font-size: 1rem;
      color: var(--c-text-2);
      line-height: 1.8;
      max-width: 700px;
      margin-bottom: var(--sp-8);
    }

    /* Season/Episode selector */
    .season-tabs {
      display: flex;
      gap: var(--sp-2);
      margin-bottom: var(--sp-6);
      flex-wrap: wrap;
    }

    .season-tab {
      padding: var(--sp-2) var(--sp-5);
      border-radius: var(--r-full);
      font-size: .875rem;
      font-weight: 600;
      border: 1px solid var(--c-border2);
      color: var(--c-text-2);
      background: var(--c-surface2);
      cursor: pointer;
      transition: all var(--t-fast);
    }

    .season-tab:hover { color: var(--c-text); border-color: var(--c-accent); }
    .season-tab.active { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }

    /* Episode grid */
    .ep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--sp-4);
      margin-bottom: var(--sp-10);
    }

    .ep-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-xl);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--t-base);
      display: flex;
      flex-direction: column;
    }

    .ep-card:hover {
      border-color: var(--c-accent);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .ep-card-thumb {
      aspect-ratio: 16/9;
      background: var(--c-surface3);
      position: relative;
      overflow: hidden;
    }

    .ep-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform var(--t-slow);
    }

    .ep-card:hover .ep-card-thumb img { transform: scale(1.05); }

    .ep-card-thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--t-base);
    }

    .ep-card:hover .ep-card-thumb-overlay { opacity: 1; }

    .ep-play-icon {
      width: 52px; height: 52px;
      background: rgba(124,58,237,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transform: scale(0.8);
      transition: transform var(--t-spring);
    }

    .ep-card:hover .ep-play-icon { transform: scale(1); }

    .ep-card-body {
      padding: var(--sp-4);
      flex: 1;
    }

    .ep-card-num { font-size: .7rem; font-weight: 700; color: var(--c-accent2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .ep-card-title { font-weight: 700; font-size: .9375rem; margin-bottom: var(--sp-2); }
    .ep-card-desc { font-size: .8125rem; color: var(--c-text-2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Progress bar on ep card */
    .ep-card-progress {
      height: 3px;
      background: var(--c-surface3);
      border-radius: 0 0 var(--r-xl) var(--r-xl);
    }

    .ep-card-progress-fill {
      height: 100%;
      background: var(--c-accent);
    }

    /* Rating stars */
    .star-rating {
      display: flex;
      gap: 4px;
    }

    .star {
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--c-surface3);
      transition: color var(--t-fast), transform var(--t-fast);
    }

    .star:hover, .star.active { color: #f59e0b; transform: scale(1.2); }

    /* Related section */
    .section-title-bar {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: var(--sp-5);
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }

    .section-title-bar::before {
      content: '';
      width: 4px;
      height: 1em;
      background: var(--c-gradient);
      border-radius: var(--r-full);
      display: block;
    }

    @media (max-width: 768px) {
      .anime-hero-content { flex-direction: column; align-items: flex-start; gap: var(--sp-4); padding: 80px var(--sp-4) var(--sp-4); }
      .anime-cover-img { width: 120px; }
      .anime-body { padding: var(--sp-4); }
      .ep-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Navbar (simplified) -->
<nav class="navbar scrolled" style="position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(7,7,16,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--c-border);height:64px;display:flex;align-items:center;padding:0 var(--sp-8);">
  <a href="index.html" style="display:flex;align-items:center;gap:var(--sp-3);">
    <div class="navbar-logo-mark">X</div>
    <span class="navbar-logo-name">AnimeX</span>
  </a>
  <a href="index.html" class="btn btn-ghost btn-sm" style="margin-left:auto;">
    <svg viewBox="0 0 24 24" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
    Inicio
  </a>
</nav>

<!-- Loading state -->
<div id="loading-state" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <div style="width:48px;height:48px;border:3px solid var(--c-surface3);border-top-color:var(--c-accent);border-radius:50%;animation:spin .8s linear infinite;"></div>
</div>

<!-- Main content (hidden until loaded) -->
<div id="main-content" style="display:none;padding-top:64px;">

  <!-- Hero -->
  <div class="anime-hero">
    <div class="anime-hero-bg">
      <img class="anime-hero-bg-img" id="hero-bg" src="" alt="" />
      <div class="anime-hero-gradient"></div>
    </div>
    <div class="anime-hero-content anim-slide-up">
      <img class="anime-cover-img" id="anime-cover" src="" alt="" />
      <div class="anime-hero-info">
        <div class="anime-detail-genres" id="anime-genres"></div>
        <h1 class="anime-detail-title" id="anime-title">—</h1>
        <div class="anime-detail-meta" id="anime-meta"></div>
        <div class="anime-detail-actions">
          <button class="btn btn-primary btn-lg" id="play-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Ver ahora
          </button>
          <button class="btn btn-ghost btn-lg" id="fav-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" id="heart-icon"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            Mi lista
          </button>
          <button class="btn btn-ghost btn-lg" id="trailer-btn" style="display:none;">
            <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            Trailer
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="anime-body">

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:var(--sp-8);margin-bottom:var(--sp-10);">

      <!-- Synopsis + Episodes -->
      <div>
        <h2 class="section-title-bar" style="margin-bottom:var(--sp-4);">Sinopsis</h2>
        <p class="anime-synopsis" id="anime-synopsis">—</p>

        <!-- Season tabs -->
        <div id="season-tabs" class="season-tabs"></div>

        <!-- Episode grid -->
        <div class="ep-grid" id="ep-grid">
          <p class="text-faint text-sm" style="grid-column:1/-1;text-align:center;padding:var(--sp-8) 0;">
            Sin episodios disponibles aún
          </p>
        </div>
      </div>

      <!-- Sidebar info -->
      <div>
        <div class="card" style="padding:var(--sp-5);margin-bottom:var(--sp-5);">
          <h3 style="font-weight:700;font-size:.9375rem;margin-bottom:var(--sp-4);">Información</h3>
          <div style="display:flex;flex-direction:column;gap:var(--sp-3);" id="anime-info-list"></div>
        </div>

        <!-- Rating -->
        <div class="card" style="padding:var(--sp-5);">
          <h3 style="font-weight:700;font-size:.9375rem;margin-bottom:var(--sp-4);">Tu calificación</h3>
          <div class="star-rating" id="star-rating">
            <span class="star" data-v="1">★</span>
            <span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span>
            <span class="star" data-v="4">★</span>
            <span class="star" data-v="5">★</span>
          </div>
          <p class="text-xs text-faint" style="margin-top:var(--sp-2);">Haz click para calificar</p>
        </div>
      </div>
    </div>

    <!-- Related animes -->
    <div id="related-section"></div>

  </div>
</div>

<!-- Trailer modal -->
<div class="overlay" id="trailer-modal">
  <div style="width:100%;max-width:800px;position:relative;">
    <button class="btn btn-ghost" onclick="closeTrailer()" style="position:absolute;top:-40px;right:0;color:#fff;">
      ✕ Cerrar
    </button>
    <div style="aspect-ratio:16/9;border-radius:var(--r-xl);overflow:hidden;">
      <iframe id="trailer-iframe" src="" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { onAuthChange, getCurrentUserData } from './assets/js/core/auth.js';
import { getAnime, getSeasons, getEpisodes } from './assets/js/services/animeService.js';
import { toggleFavorite, isFavorite, rateAnime, getUserRating, getProgress, getContinueWatching } from './assets/js/services/userService.js';
import { getBecauseYouWatched } from './assets/js/services/recommendService.js';
import { createCarousel } from './assets/js/components/carousel.js';
import { showToast } from './assets/js/components/toast.js';

const animeId = new URLSearchParams(location.search).get('id');
let anime = null;
let seasons = [];
let selectedSeason = null;

onAuthChange(async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  const data = await getCurrentUserData();
  if (!data || data.status !== 'active') { window.location.href = 'activate.html'; return; }

  if (!animeId) { window.location.href = 'index.html'; return; }

  await loadAnimePage();
});

async function loadAnimePage() {
  try {
    [anime, seasons] = await Promise.all([
      getAnime(animeId),
      getSeasons(animeId),
    ]);

    if (!anime) throw new Error('Anime no encontrado');

    document.title = `${anime.title} — AnimeX`;
    renderHero();
    renderSidebar();
    renderSeasons();

    if (seasons.length > 0) {
      await loadEpisodes(seasons[0]);
    }

    // Favorite state
    const fav = await isFavorite(animeId);
    updateFavBtn(fav);

    // User rating
    const rating = await getUserRating(animeId);
    if (rating) setStars(rating);

    // Related
    const related = await getBecauseYouWatched(animeId, 8);
    if (related.length) {
      const section = document.getElementById('related-section');
      const title = `Porque viste ${anime.title}...`;
      const carousel = createCarousel({ title, animes: related, onCardClick: a => { window.location.href = `anime.html?id=${a.id}`; } });
      if (carousel) section.appendChild(carousel);
    }

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('main-content').style.display = '';

  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    document.getElementById('loading-state').innerHTML = `
      <div style="text-align:center;color:var(--c-text);">
        <p style="margin-bottom:16px;">No se pudo cargar el anime</p>
        <a href="index.html" class="btn btn-primary">← Inicio</a>
      </div>
    `;
  }
}

function renderHero() {
  const bg = anime.banner || anime.cover || '';
  document.getElementById('hero-bg').src = bg;
  document.getElementById('anime-cover').src = anime.cover || '';
  document.getElementById('anime-cover').alt = anime.title;
  document.getElementById('anime-title').textContent = anime.title;
  document.getElementById('anime-synopsis').textContent = anime.synopsis || 'Sin sinopsis disponible.';

  // Genres
  const genresEl = document.getElementById('anime-genres');
  (anime.genres || []).forEach(g => {
    const span = document.createElement('span');
    span.className = 'badge badge-accent';
    span.textContent = g;
    genresEl.appendChild(span);
  });

  // Meta
  const metaEl = document.getElementById('anime-meta');
  const metaItems = [
    anime.year    ? `<span class="anime-meta-item">📅 ${anime.year}</span>` : '',
    anime.studio  ? `<span class="anime-meta-item">🎬 ${anime.studio}</span>` : '',
    anime.rating  ? `<span class="anime-meta-item">⭐ ${anime.rating.toFixed(1)}</span>` : '',
    anime.status  ? `<span class="anime-meta-item badge ${anime.status === 'completed' ? 'badge-success' : 'badge-warning'}">${anime.status === 'completed' ? 'Completado' : anime.status === 'ongoing' ? 'En emisión' : 'Próximamente'}</span>` : '',
  ];
  metaEl.innerHTML = metaItems.join('');

  // Trailer btn
  if (anime.trailer) {
    document.getElementById('trailer-btn').style.display = '';
    document.getElementById('trailer-btn').addEventListener('click', openTrailer);
  }
}

function renderSidebar() {
  const list = document.getElementById('anime-info-list');
  const items = [
    { label: 'Estudio',     value: anime.studio },
    { label: 'Año',         value: anime.year },
    { label: 'Estado',      value: anime.status === 'completed' ? 'Completado' : anime.status === 'ongoing' ? 'En emisión' : 'Próximamente' },
    { label: 'Temporadas',  value: seasons.length },
    { label: 'Duración',    value: anime.duration ? `${anime.duration} min` : null },
    { label: 'Idioma',      value: anime.language },
    { label: 'Vistas',      value: anime.views?.toLocaleString() || '0' },
  ];

  list.innerHTML = items
    .filter(i => i.value)
    .map(i => `
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:.875rem;">
        <span style="color:var(--c-text-3)">${i.label}</span>
        <span style="font-weight:600;">${i.value}</span>
      </div>
    `).join('');
}

function renderSeasons() {
  const tabs = document.getElementById('season-tabs');
  tabs.innerHTML = '';
  seasons.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = `season-tab ${i === 0 ? 'active' : ''}`;
    btn.textContent = `Temporada ${s.number || i + 1}`;
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      await loadEpisodes(s);
    });
    tabs.appendChild(btn);
  });
}

async function loadEpisodes(season) {
  selectedSeason = season;
  const grid = document.getElementById('ep-grid');
  grid.innerHTML = '<div class="skeleton" style="height:180px;border-radius:var(--r-xl);grid-column:1/-1;"></div>';

  const episodes = await getEpisodes(animeId, season.id);

  // Get continue watching to show progress
  const history = await getContinueWatching();
  const progressMap = {};
  history.forEach(h => {
    if (h.animeId === animeId) progressMap[h.episodeId] = h.progress || 0;
  });

  if (!episodes.length) {
    grid.innerHTML = '<p class="text-faint text-sm" style="text-align:center;grid-column:1/-1;padding:var(--sp-8) 0;">Sin episodios disponibles aún</p>';
    return;
  }

  grid.innerHTML = '';
  episodes.forEach(ep => {
    const progress = progressMap[ep.id] || 0;
    const card = document.createElement('div');
    card.className = 'ep-card anim-scale-in';
    card.innerHTML = `
      <div class="ep-card-thumb">
        ${ep.thumbnail
          ? `<img src="${ep.thumbnail}" alt="EP ${ep.number}" loading="lazy" />`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--c-surface3);color:var(--c-text-3);font-family:var(--font-display);font-size:1.5rem;font-weight:800;">EP ${ep.number}</div>`
        }
        <div class="ep-card-thumb-overlay">
          <div class="ep-play-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="white" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
      </div>
      <div class="ep-card-body">
        <div class="ep-card-num">Episodio ${ep.number}${ep.duration ? ` · ${Math.floor(ep.duration/60)}m` : ''}</div>
        <div class="ep-card-title">${ep.title || 'Sin título'}</div>
        ${ep.synopsis ? `<div class="ep-card-desc">${ep.synopsis}</div>` : ''}
      </div>
      <div class="ep-card-progress">
        <div class="ep-card-progress-fill" style="width:${progress}%"></div>
      </div>
    `;
    card.addEventListener('click', () => playEpisode(ep));
    grid.appendChild(card);
  });

  // Play button → first episode
  document.getElementById('play-btn').onclick = () => {
    const firstEp = progressMap
      ? episodes.find(e => (progressMap[e.id] || 0) > 0 && (progressMap[e.id] || 0) < 95) || episodes[0]
      : episodes[0];
    playEpisode(firstEp);
  };
}

function playEpisode(ep) {
  window.location.href = `player.html?anime=${animeId}&season=${selectedSeason.id}&episode=${ep.id}`;
}

// ── Favorite
document.getElementById('fav-btn').addEventListener('click', async () => {
  const added = await toggleFavorite(animeId);
  updateFavBtn(added);
  showToast(added ? '❤️ Agregado a tu lista' : '💔 Eliminado de tu lista', added ? 'success' : 'info');
});

function updateFavBtn(isFav) {
  const btn = document.getElementById('fav-btn');
  const icon = document.getElementById('heart-icon');
  if (isFav) {
    btn.style.color = 'var(--c-accent2)';
    icon.setAttribute('fill', 'currentColor');
    btn.childNodes[1].textContent = ' En mi lista';
  } else {
    btn.style.color = '';
    icon.setAttribute('fill', 'none');
    btn.childNodes[1].textContent = ' Mi lista';
  }
}

// ── Stars
function setStars(val) {
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.v) <= val);
  });
}

document.getElementById('star-rating').addEventListener('click', async (e) => {
  const star = e.target.closest('.star');
  if (!star) return;
  const val = parseInt(star.dataset.v);
  await rateAnime(animeId, val);
  setStars(val);
  showToast(`Calificado con ${val} ⭐`, 'success');
});

document.getElementById('star-rating').addEventListener('mouseover', (e) => {
  const star = e.target.closest('.star');
  if (!star) return;
  const val = parseInt(star.dataset.v);
  document.querySelectorAll('.star').forEach(s => {
    s.style.color = parseInt(s.dataset.v) <= val ? '#f59e0b' : '';
  });
});

document.getElementById('star-rating').addEventListener('mouseleave', async () => {
  const rating = await getUserRating(animeId);
  setStars(rating);
  document.querySelectorAll('.star').forEach(s => s.style.color = '');
});

// ── Trailer
function openTrailer() {
  document.getElementById('trailer-iframe').src = anime.trailer;
  document.getElementById('trailer-modal').classList.add('open');
}

window.closeTrailer = function() {
  document.getElementById('trailer-modal').classList.remove('open');
  document.getElementById('trailer-iframe').src = '';
};

document.getElementById('trailer-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('trailer-modal')) window.closeTrailer();
});
</script>
</body>
</html>
